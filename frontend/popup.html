<!DOCTYPE html>
<html>
<head>
  <title>YT → Spotify</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      background: #121212;
      color: #fff;
      margin: 0;
    }
    h2 { margin: 0 0 12px; color: #1DB954; }
    button {
      width: 100%;
      padding: 10px;
      background: #1DB954;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #1ed760; }
    #status {
      margin: 16px 0;
      font-size: 14px;
      line-height: 1.4;
      text-align: center;
    }
    small { opacity: 0.8; }
  </style>
</head>
<body>
  <h2>YouTube to Spotify</h2>
  <div id="status">Checking connection...</div>
  <button id="loginBtn">Connect Spotify</button>
  <script src="popup.js"></script>
</body>
</html>
